services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - knowly
  
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - uploads:/data/uploads
      - avatars:/data/avatars
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - knowly

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/output
    networks:
      - knowly
  
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - avatars:/var/www/avatars:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - knowly
  
volumes:
  postgres_data:
  uploads:
  frontend_dist:
  avatars:

networks:
  knowly:
    driver: bridge